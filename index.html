<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICSIT Companion — Production Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0d; --bg2:#0d1217; --bg3:#131920; --bg4:#1a2230;
  --border:#1e2d3a; --border2:#2a3f52;
  --ficsit:#f5a623; --ficsit2:#c97d10;
  --accent:#00d4ff; --green:#39d98a; --red:#ff5757;
  --orange:#ff8c42; --purple:#b06cff; --teal:#4ecdc4;
  --text:#c8dae8; --text2:#7a9bb5; --text3:#3d5a70;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow',sans-serif; --cond:'Barlow Condensed',sans-serif;
  --lw:415px; --hh:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.022) 1px,transparent 1px);
  background-size:40px 40px;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 40% at 50% -5%,rgba(245,166,35,.07),transparent);}
.app{position:relative;z-index:1;display:grid;grid-template-rows:var(--hh) 1fr;min-height:100vh;}
.body-row{display:grid;grid-template-columns:var(--lw) 1fr;min-height:0;}

/* HEADER */
header{grid-column:1/-1;display:flex;align-items:center;border-bottom:1px solid var(--border2);
  background:rgba(8,11,13,.96);backdrop-filter:blur(14px);position:sticky;top:0;z-index:300;}
.hdr-logo{display:flex;align-items:center;gap:12px;padding:0 20px;border-right:1px solid var(--border);
  height:100%;min-width:var(--lw);flex-shrink:0;}
.logo-hex{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--ficsit),var(--ficsit2));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;color:#000;font-weight:bold;}
.logo-title{font-family:var(--cond);font-size:19px;font-weight:900;letter-spacing:3px;color:var(--ficsit);text-transform:uppercase;line-height:1;}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;margin-top:3px;}
.hdr-tabs{display:flex;align-items:stretch;height:100%;flex:1;padding:0 18px;gap:2px;}
.tab-btn{display:flex;align-items:center;gap:7px;padding:0 18px;border:none;background:none;
  font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text3);cursor:pointer;position:relative;transition:color .15s;
  border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--ficsit);border-bottom-color:var(--ficsit);}
.tab-icon{font-size:14px;}
.hdr-right{display:flex;gap:6px;align-items:center;padding:0 18px;border-left:1px solid var(--border);height:100%;flex-shrink:0;}
.hbadge{font-family:var(--mono);font-size:9px;padding:3px 7px;border:1px solid;letter-spacing:1px;white-space:nowrap;}
.hb-o{color:var(--ficsit);border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.06);}
.hb-b{color:var(--accent);border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.05);}
.hb-p{color:var(--purple);border-color:rgba(176,108,255,.35);background:rgba(176,108,255,.05);}

/* LEFT PANEL */
.left-panel{border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;
  height:calc(100vh - var(--hh));position:sticky;top:var(--hh);overflow-y:auto;}
.ps{border-bottom:1px solid var(--border);padding:13px 16px;}
.ps:last-child{border-bottom:none;}
.slabel{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;
  margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--border);}

/* form inputs */
.fi{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);
  font-size:12px;padding:7px 9px;outline:none;transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--ficsit);}
select.fi{cursor:pointer;}
select.fi option{background:var(--bg3);}
.fi-w60{width:64px;text-align:center;}
.fi-w80{width:84px;text-align:center;}

/* buttons */
.btn{font-family:var(--mono);font-size:11px;letter-spacing:1px;padding:6px 12px;border:1px solid;
  cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap;background:none;}
.btn-go{background:linear-gradient(135deg,var(--ficsit),var(--ficsit2));border-color:var(--ficsit);color:#000;
  font-family:var(--cond);font-size:15px;font-weight:900;letter-spacing:3px;padding:12px;width:100%;margin-top:10px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.btn-go:hover{opacity:.88;}
.btn-ghost{border-color:var(--border);color:var(--text3);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text2);}
.btn-danger{border-color:rgba(255,87,87,.35);color:var(--red);background:rgba(255,87,87,.06);}
.btn-danger:hover{background:rgba(255,87,87,.14);}
.btn-add{border-color:rgba(245,166,35,.4);color:var(--ficsit);background:rgba(245,166,35,.08);}
.btn-add:hover{background:rgba(245,166,35,.18);}
.btn-w{width:100%;margin-top:6px;}

/* toggle group */
.tg{display:flex;background:var(--bg3);border:1px solid var(--border);}
.tgo{font-family:var(--mono);font-size:10px;padding:5px 9px;cursor:pointer;color:var(--text3);
  transition:all .15s;border:none;background:none;letter-spacing:.5px;}
.tgo.on{background:var(--ficsit);color:#000;}

/* layout helpers */
.row{display:flex;gap:5px;align-items:center;margin-bottom:6px;}
.row:last-child{margin-bottom:0;}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.srow:last-child{margin-bottom:0;}
.slbl{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px;flex:1;}
.col{display:flex;flex-direction:column;gap:6px;}

/* milestone buttons */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.mbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--cond);
  font-size:12px;font-weight:700;letter-spacing:1px;padding:9px 8px 9px 12px;cursor:pointer;text-align:left;
  transition:all .15s;text-transform:uppercase;position:relative;overflow:hidden;}
.mbtn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--mc,var(--ficsit));}
.mbtn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4);}
.mbtn.on{border-color:var(--mc,var(--ficsit));color:var(--mc,var(--ficsit));background:var(--bg4);}
.mbtn-t{font-size:12px;}
.mbtn-s{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px;}

/* target list */
.tlist{display:flex;flex-direction:column;gap:4px;}
.titem{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);
  padding:6px 10px;font-family:var(--mono);font-size:11px;}
.ti-n{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ti-r{color:var(--ficsit);min-width:44px;text-align:right;}
.ti-u{color:var(--text3);font-size:9px;}
.ti-x{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;transition:color .15s;}
.ti-x:hover{color:var(--red);}

/* alt panel items */
.aitem{background:var(--bg3);border:1px solid var(--border);overflow:hidden;margin-bottom:4px;}
.aitem-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .12s;}
.aitem-hdr:hover{background:rgba(255,255,255,.02);}
.aitem.open .aitem-hdr{border-bottom:1px solid var(--border);}
.ai-nm{flex:1;font-family:var(--mono);font-size:10px;color:var(--text2);}
.ai-bv{font-family:var(--mono);font-size:8px;padding:2px 5px;border:1px solid var(--border);color:var(--text3);}
.ai-ba{font-family:var(--mono);font-size:8px;padding:2px 5px;border:1px solid rgba(0,212,255,.4);color:var(--accent);background:rgba(0,212,255,.07);}
.ai-chv{color:var(--text3);font-size:9px;transition:transform .2s;}
.aitem.open .ai-chv{transform:rotate(180deg);}
.aopts{display:none;flex-direction:column;}
.aitem.open .aopts{display:flex;}
.aopt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.aopt:last-child{border-bottom:none;}
.aopt:hover{background:rgba(255,255,255,.02);}
.aopt.sel{background:rgba(0,212,255,.04);}
.aopt-rd{width:11px;height:11px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.aopt.sel .aopt-rd{border-color:var(--accent);}
.aopt-dot{width:5px;height:5px;background:var(--accent);opacity:0;transition:opacity .15s;}
.aopt.sel .aopt-dot{opacity:1;}
.aopt-body{flex:1;}
.aopt-lbl{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text);text-transform:uppercase;}
.aopt.sel .aopt-lbl{color:var(--accent);}
.aopt-mc{font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:2px;}
.aopt-io{font-family:var(--mono);font-size:9px;color:var(--text2);line-height:1.6;}
.aopt-io .inp{color:#ff8c80;}.aopt-io .out{color:#80ffb4;}

/* RIGHT PANEL */
.right-panel{overflow-y:auto;height:calc(100vh - var(--hh));}
.tab-pane{display:none;padding:20px 24px;}
.tab-pane.active{display:block;}

/* waiting state */
.wait{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:380px;color:var(--text3);text-align:center;gap:14px;}
.wait-ico{font-size:44px;opacity:.25;}
.wait-t{font-family:var(--cond);font-size:18px;letter-spacing:3px;text-transform:uppercase;}
.wait-s{font-family:var(--mono);font-size:11px;letter-spacing:1px;max-width:320px;line-height:1.7;}

/* summary cards */
.scards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.scard{background:var(--bg2);border:1px solid var(--border);padding:13px 15px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,var(--ficsit));}
.sc-l{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;}
.sc-v{font-family:var(--cond);font-size:26px;font-weight:900;color:var(--sc,var(--ficsit));line-height:1;margin-top:4px;}
.sc-u{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px;}

/* section header */
.rsec{margin-bottom:18px;}
.rshdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.rs-t{font-family:var(--cond);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.rs-c{font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:auto;}

/* resource grid */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:6px;}
.rcard{background:var(--bg2);border:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:9px;}
.rcard.raw{border-left:3px solid var(--green);}
.rcard.mid{border-left:3px solid var(--accent);}
.rc-ico{font-size:17px;}
.rc-inf{flex:1;min-width:0;}
.rc-nm{font-family:var(--mono);font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-rt{font-family:var(--cond);font-size:16px;font-weight:700;color:var(--green);}
.rc-u{font-family:var(--mono);font-size:9px;color:var(--text3);}
.rc-m{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:1px;}

/* alts-in-use */
.aiu{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;align-items:center;}
.aiu-l{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-right:2px;}
.aiu-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;border:1px solid rgba(176,108,255,.4);color:var(--purple);background:rgba(176,108,255,.07);}

/* machine table */
.mtbl{width:100%;border-collapse:collapse;}
.mtbl th{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-align:left;
  padding:6px 9px;border-bottom:1px solid var(--border);background:var(--bg2);text-transform:uppercase;}
.mtbl th:not(:first-child){text-align:right;}
.mtbl td{padding:7px 9px;font-family:var(--mono);font-size:11px;border-bottom:1px solid rgba(30,45,58,.5);vertical-align:top;}
.mtbl tr:last-child td{border-bottom:none;}
.mtbl tr:hover td{background:rgba(255,255,255,.01);}
.mtbl tr.isalt td{background:rgba(176,108,255,.025);}
.td-nm{color:var(--text);}
.td-ap{display:inline-block;font-family:var(--mono);font-size:8px;padding:1px 5px;
  border:1px solid rgba(176,108,255,.4);color:var(--purple);background:rgba(176,108,255,.07);margin-left:5px;vertical-align:middle;}
.td-ex{color:var(--accent);text-align:right;}
.td-cl{color:var(--ficsit);text-align:right;}
.td-ck{text-align:right;font-size:10px;}
.ck-ok{color:var(--green);}.ck-warn{color:var(--orange);}.ck-over{color:var(--red);}

/* machine type pills */
.mpill{display:inline-block;font-family:var(--mono);font-size:8px;padding:2px 6px;letter-spacing:1px;border:1px solid;}
.mp-sm{color:#e67e22;border-color:rgba(230,126,34,.4);}
.mp-fo{color:#95a5a6;border-color:rgba(149,165,166,.4);}
.mp-co{color:#3498db;border-color:rgba(52,152,219,.4);}
.mp-as{color:#27ae60;border-color:rgba(39,174,96,.4);}
.mp-ma{color:#e74c3c;border-color:rgba(231,76,60,.4);}
.mp-re{color:#e8941a;border-color:rgba(232,148,26,.4);}
.mp-bl{color:#9b59b6;border-color:rgba(155,89,182,.4);}
.mp-pa{color:#ff5757;border-color:rgba(255,87,87,.4);}
.mp-qe{color:#b06cff;border-color:rgba(176,108,255,.4);}
.mp-cv{color:#00d4ff;border-color:rgba(0,212,255,.4);}
.mp-ot{color:#7a9bb5;border-color:rgba(122,155,181,.4);}

/* group header */
.grphdr{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:6px 0;margin:12px 0 4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.grphdr:first-child{margin-top:0;}
.grp-cnt{font-family:var(--mono);font-size:9px;color:var(--text3);font-weight:400;}

/* power bar */
.pbar-w{background:var(--bg2);border:1px solid var(--border);padding:13px 15px;}
.pbar-r{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.pbar-l{font-family:var(--mono);font-size:10px;color:var(--text3);width:185px;}
.pbar-fw{flex:1;height:7px;background:var(--bg3);border:1px solid var(--border);}
.pbar-f{height:100%;background:linear-gradient(90deg,var(--green),var(--ficsit));transition:width .4s;}
.pbar-v{font-family:var(--mono);font-size:10px;color:var(--text2);width:76px;text-align:right;}

/* REFERENCE TAB */
.ref-lsec{margin-bottom:20px;}
.ref-lhdr{display:flex;align-items:center;gap:10px;padding:6px 0;margin-bottom:9px;border-bottom:1px solid var(--border);}
.ref-lnum{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;width:60px;}
.ref-lt{font-family:var(--cond);font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.ref-lc{font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:auto;}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px;}

/* reference card */
.rfc{background:var(--bg2);border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .15s;}
.rfc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca,var(--ficsit));opacity:.65;}
.rfc:hover,.rfc.open{border-color:var(--border2);}
.rfc-hdr{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;user-select:none;}
.rfc-hdr:hover{background:rgba(255,255,255,.015);}
.rfc-ico{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.rfc-tw{flex:1;min-width:0;}
.rfc-t{font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rfc-st{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:1px;}
.rfc-bgs{display:flex;gap:3px;flex-shrink:0;}
.rb{font-family:var(--mono);font-size:8px;padding:2px 5px;letter-spacing:.5px;border:1px solid;}
.rb-m{color:var(--ficsit);border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.07);}
.rb-a{color:var(--accent);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.06);}
.rb-l{color:var(--purple);border-color:rgba(176,108,255,.4);background:rgba(176,108,255,.06);}
.rb-k{color:var(--green);border-color:rgba(57,217,138,.4);background:rgba(57,217,138,.06);}
.rfc-chv{color:var(--text3);font-size:9px;transition:transform .2s;}
.rfc.open .rfc-chv{transform:rotate(180deg);}
.rfc-qs{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;}
.rfc-qi{flex:1;padding:5px 8px;border-right:1px solid var(--border);}
.rfc-qi:last-child{border-right:none;}
.rfc-ql{color:var(--text3);font-size:8px;}
.rfc-qv{color:var(--text2);margin-top:2px;}
.rfc-qv.hi{color:var(--accent);}
.rfc-body{display:none;padding:11px 12px;}
.rfc.open .rfc-body{display:block;}
.io-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;}
.io-list{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.io-row{display:flex;align-items:center;gap:7px;padding:4px 8px;background:var(--bg3);font-family:var(--mono);font-size:10px;border-left:2px solid transparent;}
.io-row.inp{border-left-color:var(--red);}
.io-row.out{border-left-color:var(--green);}
.io-item{flex:1;color:var(--text2);}
.io-rate{color:var(--text3);font-size:9px;}
.io-rate .sc{color:var(--ficsit);}
.rfc-note{margin-top:6px;padding:6px 9px;font-family:var(--mono);font-size:9px;color:var(--text2);line-height:1.6;border-left:2px solid;}
.rfc-note.aln{border-color:var(--accent);background:rgba(0,212,255,.04);}
.rfc-note.lpn{border-color:var(--purple);background:rgba(176,108,255,.04);}
.vtag{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:5px;letter-spacing:1px;}

/* TRAIN TAB */
.train-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
.t2col-card{background:var(--bg2);border:1px solid var(--border);padding:16px;}
.t2-title{font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ficsit);margin-bottom:12px;}
.t2-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.t2-row:last-child{margin-bottom:0;}
.t2-lbl{font-family:var(--mono);font-size:10px;color:var(--text3);flex:1;letter-spacing:.5px;}
.t2-val{font-family:var(--cond);font-size:22px;font-weight:900;}
.trk-tbl{width:100%;border-collapse:collapse;margin-bottom:16px;}
.trk-tbl th{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-align:left;padding:6px 9px;border-bottom:1px solid var(--border);background:var(--bg2);text-transform:uppercase;}
.trk-tbl td{padding:6px 9px;font-family:var(--mono);font-size:11px;border-bottom:1px solid rgba(30,45,58,.5);}
.trk-tbl tr:last-child td{border-bottom:none;}
.trk-tbl tr:hover td{background:rgba(255,255,255,.01);}
.train-rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:7px;margin-top:14px;}
.trcard{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;position:relative;overflow:hidden;}
.trcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc,var(--ficsit));}
.trc-item{font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:3px;}
.trc-rate{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px;}
.trc-cars{font-family:var(--cond);font-size:22px;font-weight:900;color:var(--tc,var(--ficsit));}
.trc-cl{font-family:var(--mono);font-size:8px;color:var(--text3);}
.trc-freq{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;}

/* POWER TAB */
.pw-scards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.pw-scard{background:var(--bg2);border:1px solid var(--border);padding:13px 15px;position:relative;overflow:hidden;}
.pw-scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc,var(--green));}
.pw-sl{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;}
.pw-sv{font-family:var(--cond);font-size:26px;font-weight:900;color:var(--pc,var(--green));line-height:1;margin-top:4px;}
.pw-su{font-family:var(--mono);font-size:9px;color:var(--text2);margin-top:2px;}
.pw-add{display:flex;gap:5px;margin-bottom:7px;}
.pload-list{display:flex;flex-direction:column;gap:4px;}
.pload-i{display:flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);padding:6px 10px;font-family:var(--mono);font-size:11px;}
.pl-n{flex:1;color:var(--text2);}
.pl-mw{color:var(--ficsit);min-width:56px;text-align:right;}
.pl-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;transition:color .15s;}
.pl-rm:hover{color:var(--red);}
.gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px;}
.gen-card{background:var(--bg2);border:1px solid var(--border);padding:13px 15px;position:relative;overflow:hidden;}
.gen-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gc,var(--green));}
.gen-type{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;}
.gen-count{font-family:var(--cond);font-size:24px;font-weight:900;color:var(--gc,var(--green));line-height:1;}
.gen-cl{font-family:var(--mono);font-size:8px;color:var(--text3);}
.gen-fuel{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:5px;line-height:1.6;}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
::-webkit-scrollbar-thumb:hover{background:var(--ficsit);}
footer{border-top:1px solid var(--border);padding:10px 22px;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-align:center;}
@media(max-width:1060px){:root{--lw:340px;}.scards{grid-template-columns:1fr 1fr;}.train-2col{grid-template-columns:1fr;}}
@media(max-width:700px){.body-row{grid-template-columns:1fr;}.left-panel{height:auto;position:static;}}

/* GAME MODE MULTIPLIERS */
.gm-section { display:flex; flex-direction:column; gap:6px; }
.gm-row { display:flex; align-items:center; gap:7px; }
.gm-lbl { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; flex:1; }
.gm-select {
  background:var(--bg3); border:1px solid var(--border); color:var(--text);
  font-family:var(--mono); font-size:10px; padding:4px 7px; outline:none;
  transition:border-color .2s; cursor:pointer; width:80px; text-align:center;
}
.gm-select:focus { border-color:var(--ficsit); }
.gm-select.active { border-color:var(--orange); color:var(--orange); background:rgba(255,140,66,.07); }
.gm-select option { background:var(--bg3); }
.gm-reset { font-family:var(--mono); font-size:9px; color:var(--text3); background:none;
  border:none; cursor:pointer; letter-spacing:1px; padding:2px 4px; transition:color .15s; }
.gm-reset:hover { color:var(--ficsit); }
/* multiplied value highlight in tables */
.mlt-val { color:var(--orange) !important; }
.mlt-base { color:var(--text3); font-size:8px; text-decoration:line-through; margin-right:3px; }
.mlt-badge {
  display:inline-block; font-family:var(--mono); font-size:7px; padding:1px 4px;
  border:1px solid rgba(255,140,66,.45); color:var(--orange);
  background:rgba(255,140,66,.08); margin-left:3px; vertical-align:middle;
}
.gm-active-strip {
  font-family:var(--mono); font-size:8px; color:var(--orange);
  background:rgba(255,140,66,.07); border:1px solid rgba(255,140,66,.25);
  padding:4px 8px; letter-spacing:1px; margin-bottom:6px;
}

/* WORLD NODE USAGE */
.node-bar-wrap{height:5px;background:var(--bg3);border:1px solid var(--border);margin-top:3px;position:relative;}
.node-bar-fill{height:100%;transition:width .4s;}
.node-ok   {background:var(--green);}
.node-warn {background:var(--orange);}
.node-over {background:var(--red);}
.node-pct  {font-family:var(--mono);font-size:8px;margin-top:2px;}
.node-pct.ok   {color:var(--green);}
.node-pct.warn {color:var(--orange);}
.node-pct.over {color:var(--red);}
/* BELT / PIPE HINTS */
.belt-hint{font-family:var(--mono);font-size:8px;margin-top:2px;letter-spacing:.5px;}
.belt-ok  {color:var(--text3);}
.belt-warn{color:var(--orange);}
.belt-over{color:var(--red);}
.belt-pill{display:inline-block;padding:0 4px;border:1px solid;font-size:7px;margin-left:2px;vertical-align:middle;}
.bp-ok  {border-color:rgba(61,90,112,.5);color:var(--text3);}
.bp-warn{border-color:rgba(255,140,66,.5);color:var(--orange);background:rgba(255,140,66,.06);}
.bp-over{border-color:rgba(255,87,87,.5);color:var(--red);background:rgba(255,87,87,.06);}
/* URL SHARE */
.share-bar{display:flex;gap:6px;align-items:center;margin-bottom:14px;
  padding:8px 12px;background:var(--bg2);border:1px solid var(--border);}
.share-url{font-family:var(--mono);font-size:9px;color:var(--text3);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;}
.share-btn{font-family:var(--mono);font-size:9px;padding:4px 10px;border:1px solid var(--border2);
  color:var(--text2);background:none;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;}
.share-btn:hover{border-color:var(--ficsit);color:var(--ficsit);}
.share-btn.copied{border-color:var(--green);color:var(--green);}

// Oil Extractor rates: Normal=60/min, Pure=120/min at Mk.2 100%
// Nitrogen: highly variable by well configuration; use as rough guide only
function worldMaxRate(item){
  const n=WORLD_NODES[item]; if(!n) return null;
  if(item==='Crude Oil') return n.n*60+n.p*120;
  if(item==='Nitrogen Gas') return n.p*150; // pressurizer estimate
  return n.i*30+n.n*60+n.p*120;
}

  const n=WORLD_NODES[item]; if(!n) return null;
  return n.i+n.n+n.p;
}

  {mk:'Mk.4',rate:480},{mk:'Mk.5',rate:780},{mk:'Mk.6',rate:1200},

// Fluid items that travel by pipe

  'Water','Crude Oil','Heavy Oil Residue','Fuel','Turbofuel','Liquid Biofuel',
  'Alumina Solution','Sulfuric Acid','Nitric Acid','Nitrogen Gas',
  'Polymer Resin', // technically liquid in pipes
]);
function beltForRate(rate){
  if(rate<=0) return null;
  return BELT_MK.find(b=>b.rate>=rate)||BELT_MK[BELT_MK.length-1];
}
function pipeForRate(rate){
  if(rate<=0) return null;
  return PIPE_MK.find(p=>p.rate>=rate)||PIPE_MK[PIPE_MK.length-1];
}
function logisticsForRate(item,rate){
  return FLUID_ITEMS.has(item)?pipeForRate(rate):beltForRate(rate);
}
function logisticsLabel(item){
  return FLUID_ITEMS.has(item)?'PIPE':'BELT';
}
function logisticsMk(item,rate){
  const t=logisticsForRate(item,rate); return t?t.mk:'Mk.6+';
}
// Warning levels: ok=fits, warn=within 10% of limit, over=exceeds
function logisticsStatus(item,rate){
  const marks=FLUID_ITEMS.has(item)?PIPE_MK:BELT_MK;
  const fit=marks.find(m=>m.rate>=rate);
  if(!fit) return 'over';
  if(rate/fit.rate>0.9) return 'warn';
  return 'ok';
}

//  RESOLVER
// ══════════════════════════════════════════════════════════════
function resolve(targets){
  const needed={};
  const vis1=new Set();
  function req1(item,rate){
    if(!needed[item])needed[item]=0; needed[item]+=rate;
    if(vis1.has(item)) return; vis1.add(item);
    if(isRaw(item)) return;
    const r=getActiveRecipe(item); if(!r) return;
    const po=r.out.find(o=>o.item===item); if(!po) return;
    r.in.forEach(i=>req1(i.item, i.rate*GM.recipe*(rate/po.rate)));
  }
  targets.forEach(t=>req1(t.item,t.rate));

  const needed2={};
  const vis2=new Set();
  function req2(item,rate){
    if(!needed2[item])needed2[item]=0; needed2[item]+=rate;
    if(vis2.has(item)) return; vis2.add(item);
    if(isRaw(item)) return;
    const r=getActiveRecipe(item); if(!r) return;
    const po=r.out.find(o=>o.item===item); if(!po) return;
    const totalNeeded=needed[item]||rate; // fallback to current rate if not in pass1
    const m=totalNeeded/po.rate;
    r.in.forEach(i=>req2(i.item,i.rate*GM.recipe*m));
  }
  targets.forEach(t=>req2(t.item,t.rate));

  const machines={}, raws={};
  Object.entries(needed2).forEach(([item,totalRate])=>{
    if(isRaw(item)){raws[item]=(raws[item]||0)+totalRate; return;}
    const r=getActiveRecipe(item); if(!r) return;
    const po=r.out.find(o=>o.item===item); if(!po) return;
    const exact=totalRate/po.rate;
    const isAlt=(PS.altSelections[item]||0)>0;
    machines[item]={exact,ceilInt:Math.ceil(exact),recipe:r,layer:r.layer||'L?',totalRate,isAlt,altLabel:isAlt?r.label:null};
  });
  return {machines,raws,chainItems:Object.keys(needed2)};
}

    const b=document.createElement('button'); b.className='tgo'+(stateObj[key]===val?' on':'');
    b.textContent=lbl; b.addEventListener('click',()=>{ stateObj[key]=val; w.querySelectorAll('.tgo').forEach(x=>x.classList.toggle('on',x===b)); if(activeTab==='planner'&&PS.lastResult) renderPlannerRight(); if(activeTab==='reference') renderReference(); });
    w.appendChild(b);
  });
  parent.appendChild(w);
}

// ══════════════════════════════════════════════════════════════
//  PLANNER LEFT PANEL
// ══════════════════════════════════════════════════════════════
function buildPlannerLeft(lp){
  lp.innerHTML=''; // always clear before rebuilding
  // Milestones
  const ms=ps_sec(lp,'Milestone Presets');
  const mg=document.createElement('div'); mg.className='mg'; ms.appendChild(mg);
  MILESTONES.forEach(m=>{
    const b=document.createElement('button'); b.className='mbtn'+(PS.activeMilestone===m.id?' on':'');
    b.style.setProperty('--mc',m.color); b.dataset.mid=m.id;
    b.innerHTML=`<div class="mbtn-t">${m.label}</div><div class="mbtn-s">${m.sub}</div>`;
    b.addEventListener('click',()=>{
      if(PS.activeMilestone===m.id){PS.activeMilestone=null;PS.targets=[];}
      else{PS.activeMilestone=m.id;PS.targets=[...m.targets];}
      buildPlannerLeft(lp);
    });
    mg.appendChild(b);
  });

  // Game Mode Multipliers (v1.2)
  const gmSec=ps_sec(lp,'Game Mode · v1.2');
  const gmDiv=document.createElement('div'); gmDiv.className='gm-section'; gmSec.appendChild(gmDiv);

  function buildGmRow(labelText, optArr, stateKey){
    const r=document.createElement('div'); r.className='gm-row';
    const l=document.createElement('span'); l.className='gm-lbl'; l.textContent=labelText;
    const s=document.createElement('select'); s.className='gm-select'+(GM[stateKey]!==1?' active':'');
    optArr.forEach(v=>{
      const o=document.createElement('option'); o.value=v; o.textContent=v===1?`×${v} (default)`:`×${v}`;
      if(GM[stateKey]===v) o.selected=true; s.appendChild(o);
    });
    s.addEventListener('change',e=>{
      GM[stateKey]=parseFloat(e.target.value);
      s.className='gm-select'+(GM[stateKey]!==1?' active':'');
      updateGmBadge();
      if(PS.lastResult) renderPlannerRight();
    });
    r.appendChild(l); r.appendChild(s); gmDiv.appendChild(r);
  }

  buildGmRow('RECIPE COST',    GM_RECIPE_OPTS, 'recipe');
  buildGmRow('POWER DRAW',     GM_POWER_OPTS,  'power');

  const gmResetRow=document.createElement('div'); gmResetRow.style.cssText='display:flex;justify-content:flex-end;margin-top:2px;';
  const gmRst=document.createElement('button'); gmRst.className='gm-reset'; gmRst.textContent='RESET TO VANILLA';
  gmRst.addEventListener('click',()=>{GM.recipe=1;GM.power=1;updateGmBadge();buildPlannerLeft(lp);if(PS.lastResult)renderPlannerRight();});
  gmResetRow.appendChild(gmRst); gmDiv.appendChild(gmResetRow);

  // Custom targets
  const ct=ps_sec(lp,'Custom Targets');
  const row=document.createElement('div'); row.className='row'; ct.appendChild(row);
  const sel=document.createElement('select'); sel.className='fi'; sel.style.flex='1';
  PRODUCIBLE.forEach(item=>{const o=document.createElement('option');o.value=item;o.textContent=item;sel.appendChild(o);});
  const qty=document.createElement('input'); qty.type='number'; qty.className='fi fi-w60'; qty.value='1'; qty.min='0.1'; qty.step='0.5';
  const ab=document.createElement('button'); ab.className='btn btn-add'; ab.textContent='+ADD';
  ab.addEventListener('click',()=>{
    const item=sel.value; const rate=parseFloat(qty.value);
    if(!item||isNaN(rate)||rate<=0) return;
    const ex=PS.targets.find(t=>t.item===item);
    if(ex)ex.rate+=rate; else PS.targets.push({item,rate});
    PS.activeMilestone=null;
    buildPlannerLeft(lp);
  });
  qty.addEventListener('keydown',e=>{if(e.key==='Enter')ab.click();});
  row.appendChild(sel); row.appendChild(qty); row.appendChild(ab);

  // Divider + active targets label — visual separation between controls and the list
  if(PS.targets.length>0){
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:8px;margin:9px 0 5px;';
    const ln1=document.createElement('div'); ln1.style.cssText='flex:1;height:1px;background:var(--border);';
    const lbl=document.createElement('span');
    lbl.style.cssText='font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;white-space:nowrap;text-transform:uppercase;';
    lbl.textContent=`Active Targets · ${PS.targets.length}`;
    const ln2=document.createElement('div'); ln2.style.cssText='flex:1;height:1px;background:var(--border);';
    div.appendChild(ln1); div.appendChild(lbl); div.appendChild(ln2);
    ct.appendChild(div);
  }

  const tlist=document.createElement('div'); tlist.className='tlist'; ct.appendChild(tlist);
  PS.targets.forEach((t,i)=>{
    const el=document.createElement('div'); el.className='titem';
    const ico=RECIPE_DB[t.item]?.[0]?.icon||'📦';
    el.innerHTML=`<span class="ti-n">${ico} ${t.item}</span><span class="ti-r">${fmt(t.rate,2)}</span><span class="ti-u">/min</span>`;
    const rm=document.createElement('button'); rm.className='ti-x'; rm.textContent='×';
    rm.addEventListener('click',()=>{PS.targets.splice(i,1);PS.activeMilestone=null;buildPlannerLeft(lp);});
    el.appendChild(rm); tlist.appendChild(el);
  });

  // Alt recipes (only if chain has been calculated)
  const altSec=ps_sec(lp,'Alt Recipes');
  altSec.id='altPanelSection';
  buildAltPanel(altSec);

  // Settings
  const stSec=ps_sec(lp,'Display Settings');
  const sg=document.createElement('div'); sg.className='col'; stSec.appendChild(sg);
  const rows=[
    ['MACHINES',  'machineMode', [['both','BOTH'],['exact','EXACT'],['ceil','CEIL']]],
    ['GROUP BY',  'groupBy',     [['layer','LAYER'],['machine','TYPE'],['flat','FLAT']]],
    ['CLOCK %',   'showClock',   [['yes','SHOW'],['no','HIDE']]],
    ['POWER',     'showPower',   [['yes','SHOW'],['no','HIDE']]],
  ];
  rows.forEach(([lbl,key,opts])=>{
    const r=document.createElement('div'); r.className='srow';
    const l=document.createElement('span'); l.className='slbl'; l.textContent=lbl;
    r.appendChild(l); ps_tg(r,key,opts,PS); sg.appendChild(r);
  });

  // Action buttons
  const calc=document.createElement('button'); calc.className='btn-go'; calc.textContent='▶ CALCULATE';
  calc.addEventListener('click',renderPlannerRight); stSec.appendChild(calc);
  // Share button
  const shr=document.createElement('button'); shr.className='btn btn-ghost btn-w'; shr.id='shareBtn'; shr.textContent='⎘ SHARE PLAN';
  shr.addEventListener('click',()=>shareURL());
  stSec.appendChild(shr);

  const clr=document.createElement('button'); clr.className='btn btn-ghost btn-w'; clr.textContent='✕ CLEAR RESULTS';
  clr.addEventListener('click',()=>{PS.lastResult=null;showWaiting('pane-planner','⚙','Awaiting Targets','Select a milestone or add custom targets, then hit CALCULATE.');});
  stSec.appendChild(clr);
  const rst=document.createElement('button'); rst.className='btn btn-danger btn-w'; rst.style.marginTop='4px'; rst.textContent='⟳ RESET EVERYTHING';
  rst.addEventListener('click',()=>{
    PS.targets=[];PS.activeMilestone=null;PS.altSelections={};PS.lastResult=null;PS.chainItems=[];
    updateAltBadge(); buildPlannerLeft(lp);
    showWaiting('pane-planner','⚙','Awaiting Targets','Select a milestone or add custom targets, then hit CALCULATE.');
  });
  stSec.appendChild(rst);
}

function buildAltPanel(container){
  const altItems=PS.chainItems.filter(item=>{ const v=RECIPE_DB[item]; return v&&v.length>1; }).sort();
  if(altItems.length===0){
    const d=document.createElement('div'); d.style.cssText='font-family:var(--mono);font-size:9px;color:var(--text3);padding:6px 0;text-align:center;letter-spacing:1px;';
    d.textContent='Run CALCULATE to see alts for your chain.'; container.appendChild(d); return;
  }
  const badge=document.createElement('div');
  badge.style.cssText='font-family:var(--mono);font-size:8px;padding:2px 7px;background:rgba(176,108,255,.1);border:1px solid rgba(176,108,255,.35);color:var(--purple);letter-spacing:1px;display:inline-block;margin-bottom:5px;';
  badge.textContent=`${altItems.length} WITH ALTS · ${activeAltCount()} ACTIVE`;
  container.appendChild(badge);

  altItems.forEach(item=>{
    const vs=RECIPE_DB[item]; const ai=PS.altSelections[item]||0; const av=vs[ai];
    const isAlt=ai>0;
    const el=document.createElement('div'); el.className='aitem'; el.dataset.item=item;
    const hdr=document.createElement('div'); hdr.className='aitem-hdr';
    hdr.innerHTML=`<span class="ai-nm">${vs[0].icon||'⚙'} ${item}</span>
      <span class="${isAlt?'ai-ba':'ai-bv'}">${isAlt?'◆ '+av.label:'VANILLA'}</span>
      <span class="ai-chv">▼</span>`;
    hdr.addEventListener('click',()=>el.classList.toggle('open'));
    el.appendChild(hdr);

    const opts=document.createElement('div'); opts.className='aopts';
    vs.forEach((v,idx)=>{
      const sel=idx===ai;
      const inStr=v.in.length>0?v.in.map(i=>`<span class="inp">${fmt(i.rate,2)} ${i.item}</span>`).join(' + '):'<span style="color:var(--text3)">no inputs</span>';
      const outStr=v.out.map(o=>`<span class="out">${fmt(o.rate,2)} ${o.item}</span>`).join(' + ');
      const opt=document.createElement('div'); opt.className='aopt'+(sel?' sel':'');
      opt.innerHTML=`<div class="aopt-rd"><div class="aopt-dot"></div></div>
        <div class="aopt-body">
          <div class="aopt-lbl">${idx===0?'▸ VANILLA — ':''}${v.label}</div>
          <div class="aopt-mc">${v.machine} · ${v.mw}MW</div>
          <div class="aopt-io">${inStr} → ${outStr}</div>
        </div>`;
      opt.addEventListener('click',()=>{
        if(idx===0) delete PS.altSelections[item]; else PS.altSelections[item]=idx;
        updateAltBadge();
        if(PS.lastResult) renderPlannerRight();
        buildPlannerLeft(document.getElementById('leftPanel'));
      });
      opts.appendChild(opt);
    });
    el.appendChild(opts); container.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════════
//  PLANNER RIGHT PANEL
// ══════════════════════════════════════════════════════════════
function renderPlannerRight(){
  const pane=document.getElementById('pane-planner');
  if(PS.targets.length===0){showWaiting('pane-planner','⚙','Awaiting Targets','Select a milestone or add custom targets, then hit CALCULATE.'); return;}

  const {machines,raws,chainItems}=resolve(PS.targets);
  PS.lastResult={machines,raws}; PS.chainItems=chainItems;
  buildAltPanel_refresh();
  pushState(); // update URL hash on every calculate

  const totalEx=Object.values(machines).reduce((a,v)=>a+v.exact,0);
  const totalCl=Object.values(machines).reduce((a,v)=>a+v.ceilInt,0);
  let totalMW=0; Object.values(machines).forEach(m=>totalMW+=(MACHINE_POWER[m.recipe.machine]||0)*GM.power*m.exact);
  const rawCount=Object.keys(raws).length;
  const altsUsed=Object.values(machines).filter(m=>m.isAlt);

  // Group
  let groups={};
  if(PS.groupBy==='layer'){
    LAYER_ORDER.forEach(l=>groups[l]=[]); groups['L?']=[];
    Object.entries(machines).forEach(([item,data])=>{const l=data.layer;if(!groups[l])groups[l]=[];groups[l].push({item,...data});});
  } else if(PS.groupBy==='machine'){
    Object.entries(machines).forEach(([item,data])=>{const m=data.recipe.machine;if(!groups[m])groups[m]=[];groups[m].push({item,...data});});
  } else {
    groups['Full Chain']=Object.entries(machines).map(([item,data])=>({item,...data}));
  }

  let h='';

  // Game Mode active strip
  const gmActive=(GM.recipe!==1||GM.power!==1);
  if(gmActive){
    const parts=[];
    if(GM.recipe!==1) parts.push(`RECIPE COST ×${GM.recipe}`);
    if(GM.power!==1)  parts.push(`POWER ×${GM.power}`);
    h+=`<div class="gm-active-strip">⚠ GAME MODE ACTIVE: ${parts.join(' · ')} — affected values highlighted in amber</div>`;
  }

  // Summary
  h+=`<div class="scards">
    <div class="scard" style="--sc:var(--ficsit)"><div class="sc-l">MACHINES EXACT</div><div class="sc-v">${fmt(totalEx,1)}</div><div class="sc-u">fractional</div></div>
    <div class="scard" style="--sc:var(--accent)"><div class="sc-l">MACHINES CEIL</div><div class="sc-v">${totalCl}</div><div class="sc-u">integer buildings</div></div>
    <div class="scard" style="--sc:var(--green)"><div class="sc-l">RAW RESOURCES</div><div class="sc-v">${rawCount}</div><div class="sc-u">input types</div></div>
    <div class="scard" style="--sc:var(--purple)"><div class="sc-l">PEAK POWER</div><div class="sc-v">${totalMW>=1000?fmt(totalMW/1000,2)+'GW':fmt(totalMW,0)+'MW'}</div><div class="sc-u">at 100% clock</div></div>
  </div>`;

  if(altsUsed.length>0){
    h+=`<div class="aiu"><span class="aiu-l">ALTS ACTIVE:</span>${altsUsed.map(m=>`<span class="aiu-tag">◆ ${m.altLabel}</span>`).join('')}</div>`;
  }

  // Share bar
  pushState();
  h+=`<div class="share-bar">
    <span class="share-url" id="shareUrlField">${window.location.href}</span>
    <button class="share-btn" id="shareCopyBtn" onclick="shareURL()">COPY LINK</button>
  </div>`;

  // Targets
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">🎯 Targets</span></div><div class="rgrid">
    ${PS.targets.map(t=>{const ico=RECIPE_DB[t.item]?.[0]?.icon||'📦';return `<div class="rcard mid"><div class="rc-ico">${ico}</div><div class="rc-inf"><div class="rc-nm">${t.item}</div><div class="rc-rt">${fmt(t.rate,2)}</div><div class="rc-u">per minute</div></div></div>`;}).join('')}
  </div></div>`;

  // Machines
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">⚙ Factory Requirements</span><span class="rs-c">${Object.keys(machines).length} TYPES · ${totalCl} BUILDINGS</span></div>`;

  Object.entries(groups).forEach(([gn,items])=>{
    if(!items||items.length===0) return;
    const gc=LAYERS[gn]?.color||'#f5a623';
    const gl=LAYERS[gn]?.label||gn;
    h+=`<div class="grphdr" style="color:${gc}">${gl}<span class="grp-cnt">${items.length} TYPE${items.length>1?'S':''}</span></div>
    <table class="mtbl"><thead><tr>
      <th style="width:32%">FACTORY</th><th>MACHINE</th>
      ${PS.machineMode!=='ceil'?'<th>EXACT</th>':''}
      ${PS.machineMode!=='exact'?'<th>CEIL</th>':''}
      ${PS.showClock==='yes'?'<th>CLOCK%</th>':''}
      <th>OUT/MIN</th><th>LOGISTICS</th>
    </tr></thead><tbody>`;
    items.sort((a,b)=>((LAYERS[a.layer]?.ord??99)-(LAYERS[b.layer]?.ord??99))||a.item.localeCompare(b.item)).forEach(itm=>{
      const r=itm.recipe;
      const ck=itm.exact/itm.ceilInt*100;
      const ckc=ck>=99.5?'ck-over':ck>=75?'ck-ok':'ck-warn';
      // belt/pipe hints
      const perMachineRate=itm.totalRate/itm.ceilInt;
      const combinedRate=itm.totalRate;
      const lbl=logisticsLabel(itm.item);
      const perSt=logisticsStatus(itm.item,perMachineRate);
      const combSt=logisticsStatus(itm.item,combinedRate);
      const perMk=logisticsMk(itm.item,perMachineRate);
      const combMk=logisticsMk(itm.item,combinedRate);
      const beltCell=`<div class="belt-hint belt-${perSt}">
        per machine: <span class="belt-pill bp-${perSt}">${lbl} ${perMk}</span> ${fmt(perMachineRate,1)}/min
      </div>
      <div class="belt-hint belt-${combSt}">
        combined: <span class="belt-pill bp-${combSt}">${lbl} ${combMk}</span> ${fmt(combinedRate,1)}/min
      </div>`;
      h+=`<tr class="${itm.isAlt?'isalt':''}">
        <td><div class="td-nm">${r.icon||'⚙'} ${itm.item}${itm.isAlt?`<span class="td-ap">ALT</span>`:''}</div>
          ${itm.isAlt?`<div style="font-family:var(--mono);font-size:8px;color:var(--purple);margin-top:1px;">${r.label}</div>`:''}</td>
        <td><span class="mpill ${mpillClass(r.machine)}">${r.machine}</span></td>
        ${PS.machineMode!=='ceil'?`<td class="td-ex">${fmt(itm.exact,3)}</td>`:''}
        ${PS.machineMode!=='exact'?`<td class="td-cl">${itm.ceilInt}</td>`:''}
        ${PS.showClock==='yes'?`<td class="td-ck"><span class="${ckc}">${fmt(ck,1)}%</span></td>`:''}
        <td style="text-align:right;color:var(--green)">${fmt(itm.totalRate,2)}</td>
        <td>${beltCell}</td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  });
  h+=`</div>`;

  // Raws
  const gmMltActive=GM.recipe!==1;
  const rawMltNote=gmMltActive?` <span style="font-family:var(--mono);font-size:8px;color:var(--orange);">×${GM.recipe} COST MULTIPLIER ACTIVE</span>`:'';
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">⛏ Raw Resources</span><span class="rs-c">${rawCount} TYPES</span>${rawMltNote}</div><div class="rgrid">
    ${Object.entries(raws).sort((a,b)=>b[1]-a[1]).map(([item,rate])=>{
      const noExtractor=['Water','Heavy Oil Residue','Polymer Resin','Compacted Coal','Petroleum Coke','Solid Biofuel'].includes(item);
      const ico=RAWS[item]?.icon||'⛏';

      // Rate display — strike base, show multiplied in amber if recipe cost is active
      const baseRate=rate/GM.recipe;
      const rateHtml=gmMltActive
        ?`<span class="mlt-base">${fmt(baseRate,1)}</span><span class="mlt-val">${fmt(rate,1)}</span>`
        :`${fmt(rate,1)}`;

      // Miner count: use base rate (what vanilla nodes must supply) ÷ Mk.3 normal node rate (60/min)
      // Normal node is the median realistic node — gives a practical "mining outpost" count
      // Use base rate so the count reflects vanilla node planning, not the recipe multiplier
      const normalNodeRate=item==='Crude Oil'?60:60; // Mk.3 normal node: 60/min solid, 60/min oil
      const minerCount=noExtractor?null:Math.ceil(baseRate/normalNodeRate*10)/10;

      // World supply: compare base rate against vanilla world max
      // Comparing multiplied rate would give misleading "over 100%" figures on recipe cost >1
      const maxW=worldMaxRate(item);
      const nodeTotal=worldNodeTotal(item);
      const supplyPct=maxW?(baseRate/maxW*100):null;

      let nodeHtml='';
      if(supplyPct!==null){
        const barPct=Math.min(supplyPct,100); // bar caps at 100% visually
        const isOver=supplyPct>100;
        const status=isOver?'over':supplyPct>75?'warn':'ok';
        const pctLabel=isOver?`>${fmt(supplyPct,0)}% of world max`:fmt(supplyPct,1)+'% of world max';
        const overMsg=isOver
          ? `<div class="node-pct over" style="margin-top:2px;">⚠ Exceeds sustained world supply — reduce scope or overclock miners</div>`
          : '';
        // Suppress the overflow warning if recipe cost multiplier is causing it
        // (player can still complete — just takes longer at lower rate)
        const gmOverMsg=isOver&&gmMltActive
          ? `<div class="node-pct" style="color:var(--orange);margin-top:2px;">Rate reflects ×${GM.recipe} recipe cost. At vanilla cost this would use ${fmt(supplyPct/GM.recipe,1)}% of world supply.</div>`
          : overMsg;
        nodeHtml=`
          <div class="node-bar-wrap"><div class="node-bar-fill node-${status}" style="width:${barPct.toFixed(1)}%"></div></div>
          <div class="node-pct ${isOver?'':''}${status}" style="margin-top:2px;">${pctLabel} · ${nodeTotal} nodes · max ${fmt(maxW,0)}/min</div>
          ${gmOverMsg}`;
      }

      return `<div class="rcard raw" style="${gmMltActive?'border-left-color:var(--orange)':''}">
        <div class="rc-ico">${ico}</div>
        <div class="rc-inf">
          <div class="rc-nm">${item}</div>
          <div class="rc-rt">${rateHtml}</div>
          <div class="rc-u">per minute</div>
          ${minerCount!==null?`<div class="rc-m">~${fmt(minerCount,1)} Mk.3 normal-node miners needed</div>`:''}
          <div>${nodeHtml}</div>
        </div>
      </div>`;
    }).join('')}
  </div></div>`;

  // Power
  if(PS.showPower==='yes'){
    const byMt={}; Object.values(machines).forEach(m=>{const mt=m.recipe.machine;if(!byMt[mt])byMt[mt]=0;byMt[mt]+=(MACHINE_POWER[mt]||0)*GM.power*m.exact;});
    const maxMW=Math.max(...Object.values(byMt),1);
    h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">⚡ Power Breakdown</span><span class="rs-c">TOTAL: ${totalMW>=1000?fmt(totalMW/1000,2)+' GW':fmt(totalMW,0)+' MW'}</span></div>
    <div class="pbar-w">
      ${Object.entries(byMt).sort((a,b)=>b[1]-a[1]).map(([mt,mw])=>`
      <div class="pbar-r">
        <span class="pbar-l">${mt}</span>
        <div class="pbar-fw"><div class="pbar-f" style="width:${(mw/maxMW*100).toFixed(1)}%"></div></div>
        <span class="pbar-v">${mw>=1000?fmt(mw/1000,2)+' GW':fmt(mw,0)+' MW'}</span>
      </div>`).join('')}
    </div></div>`;
  }

  pane.innerHTML=h;
}

function buildAltPanel_refresh(){
  // Refresh only the alt section — never rebuild the whole left panel from here.
  // Rebuilding lp caused the duplicate milestone panel bug.
  updateAltBadge();
  if(activeTab!=='planner') return;
  const altSec=document.getElementById('altPanelSection');
  if(!altSec) return;
  // Keep only the first child (the .slabel), remove everything after it
  while(altSec.children.length>1) altSec.removeChild(altSec.lastChild);
  buildAltPanel(altSec);
}

// ══════════════════════════════════════════════════════════════
//  REFERENCE LEFT PANEL + RIGHT PANEL
// ══════════════════════════════════════════════════════════════
function buildReferenceLeft(lp){
  lp.innerHTML='';
  const s1=ps_sec(lp,'Search & Filter');
  const si=document.createElement('input'); si.type='text'; si.className='fi'; si.placeholder='Search items, machines...'; si.value=RS.search;
  si.addEventListener('input',e=>{RS.search=e.target.value;renderReference();});
  s1.appendChild(si);

  const r1=document.createElement('div'); r1.className='row'; r1.style.marginTop='5px';
  const layerSel=document.createElement('select'); layerSel.className='fi'; layerSel.style.flex='1';
  [['all','ALL LAYERS'],...LAYER_ORDER.map(k=>[k,LAYERS[k].label])].forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(v===RS.layerFilter)o.selected=true;layerSel.appendChild(o);});

// Build flat factory list from RECIPE_DB for the reference tab
function buildRefFactories(){
  const list=[];
  Object.entries(RECIPE_DB).forEach(([item,variants])=>{
    const v=variants[0]; // always show vanilla in reference (with alt note)
    list.push({
      id:`ref-${item.replace(/\s+/g,'-').toLowerCase()}`,
      name:item, icon:v.icon||'⚙', layer:v.layer||'L?',
      machine:v.machine, machineCount:1,
      inputs:v.in, outputs:v.out,
      altNote:v.altNote, loopNote:v.loopNote, tags:v.tags||[],
      altCount:variants.length-1,
    });
  });
  return list;
}
const REF_FACTORIES=buildRefFactories();

function filterRefFactories(){
  const q=RS.search.toLowerCase();
  return REF_FACTORIES.filter(f=>{
    if(RS.layerFilter!=='all'&&f.layer!==RS.layerFilter) return false;
    if(RS.machineFilter!=='all'&&f.machine!==RS.machineFilter) return false;
    if(RS.altOnly&&f.altCount===0) return false;
    if(q){
      const hay=[f.name,f.machine,f.layer,...f.inputs.map(i=>i.item),...f.outputs.map(o=>o.item),f.altNote||''].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderReference(){
  const pane=document.getElementById('pane-reference');
  const filtered=filterRefFactories();

  if(filtered.length===0){
    pane.innerHTML=`<div class="wait"><div class="wait-ico">🔍</div><div class="wait-t">No Results</div><div class="wait-s">Try different search terms or clear the filters.</div></div>`;
    return;
  }

  const byLayer={};
  LAYER_ORDER.forEach(k=>byLayer[k]=[]);
  byLayer['L?']=[];
  filtered.forEach(f=>{if(!byLayer[f.layer])byLayer[f.layer]=[];byLayer[f.layer].push(f);});

  let h='';
  LAYER_ORDER.forEach(lk=>{
    const facts=byLayer[lk];
    if(!facts||facts.length===0) return;
    const lmeta=LAYERS[lk]||{label:lk,color:'#f5a623'};
    h+=`<div class="ref-lsec">
      <div class="ref-lhdr">
        <span class="ref-lnum">LAYER ${lk}</span>
        <span class="ref-lt" style="color:${lmeta.color}">${lmeta.label}</span>
        <span class="ref-lc">${facts.length} RECIPES</span>
      </div>
      <div class="ref-grid">`;
    facts.forEach(f=>{
      const isOpen=RS.expanded.has(f.id);
      const eff=f.machineCount*RS.scale;
      const pOut=f.outputs[0]; const pIn=f.inputs[0];
      const acColor=lmeta.color;
      h+=`<div class="rfc${isOpen?' open':''}" style="--ca:${acColor}" data-rfid="${f.id}">
        <div class="rfc-hdr">
          <div class="rfc-ico">${f.icon}</div>
          <div class="rfc-tw"><div class="rfc-t">${f.name}</div><div class="rfc-st">${f.machine.toUpperCase()}</div></div>
          <div class="rfc-bgs">
            <span class="rb rb-m">${fmt(eff,1)}×</span>
            ${f.altCount>0?`<span class="rb rb-a">${f.altCount} ALT${f.altCount>1?'S':''}</span>`:''}
            ${f.tags.includes('loop')?'<span class="rb rb-l">LOOP</span>':''}
            ${f.tags.includes('key')?'<span class="rb rb-k">KEY</span>':''}
          </div>
          <span class="rfc-chv">▼</span>
        </div>
        <div class="rfc-qs">
          <div class="rfc-qi"><div class="rfc-ql">PRIMARY IN</div><div class="rfc-qv">${pIn?pIn.item+' · '+fmt(pIn.rate*RS.scale,2)+'/min':'—'}</div></div>
          <div class="rfc-qi"><div class="rfc-ql">PRIMARY OUT</div><div class="rfc-qv hi">${pOut?pOut.item+' · '+fmt(pOut.rate*RS.scale,2)+'/min':'—'}</div></div>
        </div>
        <div class="rfc-body">
          ${f.inputs.length>0?`<div class="io-lbl">INPUTS</div><div class="io-list">
            ${f.inputs.map(i=>`<div class="io-row inp"><span class="io-item">${i.item}</span><span class="io-rate"><span class="sc">${fmt(i.rate*RS.scale,2)}</span>/min (base: ${fmt(i.rate,2)})</span></div>`).join('')}
          </div>`:''}
          <div class="io-lbl">OUTPUTS</div><div class="io-list">
            ${f.outputs.map(o=>`<div class="io-row out"><span class="io-item">${o.item}</span><span class="io-rate"><span class="sc">${fmt(o.rate*RS.scale,2)}</span>/min (base: ${fmt(o.rate,2)})</span></div>`).join('')}
          </div>
          ${f.altNote?`<div class="rfc-note aln"><strong>⚗ ALT / NOTES:</strong> ${f.altNote}</div>`:''}
          ${f.loopNote?`<div class="rfc-note lpn"><strong>♻ LOOP NOTE:</strong> ${f.loopNote}</div>`:''}
          <div class="vtag">VANILLA RECIPE · v1.0 · 100% CLOCK</div>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });

  pane.innerHTML=h;

  // Attach expand/collapse
  pane.querySelectorAll('.rfc').forEach(card=>{
    card.querySelector('.rfc-hdr').addEventListener('click',()=>{
      const id=card.dataset.rfid;
      if(RS.expanded.has(id)) RS.expanded.delete(id); else RS.expanded.add(id);
      card.classList.toggle('open',RS.expanded.has(id));
    });
  });
}

function renderTrain(){
  const pane=document.getElementById('pane-train');
  const vinfo=VEHICLES[TS.vehicle];

  // ── Compute round-trip frequency and capacity per trip based on vehicle
  let freqMin, capacityCalc, cargoType, vehicleLabel;

  if(TS.vehicle==='train'){
    freqMin=TS.trainFreqMin;
    cargoType=TS.trainCargoType;
    vehicleLabel=`Train (${TS.carsPerTrain} car${TS.carsPerTrain>1?'s':''})`;
    capacityCalc=(item)=>{
      const cap=vinfo[cargoType];
      if(cargoType==='solid'){
        const ss=STACK_SIZE[item]||STACK_SIZE.default;
        return cap.carCap*ss*TS.carsPerTrain; // items per trip
      } else {
        return cap.carCap*TS.carsPerTrain; // m³ per trip
      }
    };
  } else if(TS.vehicle==='truck'){
    freqMin=TS.truckFreqMin;
    cargoType=TS.truckCargoType;
    vehicleLabel='Truck';
    capacityCalc=(item)=>{
      const cap=vinfo[cargoType];
      if(cargoType==='solid'){
        const ss=STACK_SIZE[item]||STACK_SIZE.default;
        return cap.carCap*ss;
      } else {
        return cap.carCap;
      }
    };
  } else { // drone
    // Round trip time = 2 * dist / 120 km/h * 60 min/h = dist/1
    freqMin=(2*TS.droneDistKm/120)*60;
    cargoType='solid';
    vehicleLabel=`Drone (${TS.droneCount} unit${TS.droneCount>1?'s':''})`;
    capacityCalc=(item)=>{
      const ss=STACK_SIZE[item]||STACK_SIZE.default;
      return 4*ss*TS.droneCount; // 4 slots per drone × stack size × drone count
    };
  }

  const effFreq=freqMin;

  // ── Summary config card
  let h=`<div class="rsec"><div class="rshdr"><span class="rs-t">${vinfo.icon} ${vinfo.name} Configuration</span></div>`;
  h+=`<div class="train-2col">
    <div class="t2col-card">
      <div class="t2-title">${vehicleLabel}</div>`;

  if(TS.vehicle==='train'){
    const capSolid=vinfo.solid.carCap*STACK_SIZE.default*TS.carsPerTrain;
    const capFluid=vinfo.fluid.carCap*TS.carsPerTrain;
    h+=`<div class="t2-row"><span class="t2-lbl">CARGO TYPE</span><span class="t2-val" style="color:var(--ficsit);font-size:14px">${TS.trainCargoType.toUpperCase()}</span></div>
    <div class="t2-row"><span class="t2-lbl">CARS PER TRAIN</span><span class="t2-val" style="color:var(--accent);font-size:14px">${TS.carsPerTrain}</span></div>
    <div class="t2-row"><span class="t2-lbl">ROUND TRIP</span><span class="t2-val" style="color:var(--green);font-size:14px">${TS.trainFreqMin} min</span></div>
    <div class="t2-row"><span class="t2-lbl">CAPACITY / TRIP</span><span class="t2-val" style="font-size:13px;color:var(--text2)">${TS.trainCargoType==='solid'?capSolid+' items (default stack)':fmt(capFluid,0)+' m³'}</span></div>`;
  } else if(TS.vehicle==='truck'){
    const cap=TS.truckCargoType==='solid'?vinfo.solid.carCap*STACK_SIZE.default:vinfo.fluid.carCap;
    h+=`<div class="t2-row"><span class="t2-lbl">CARGO TYPE</span><span class="t2-val" style="color:var(--ficsit);font-size:14px">${TS.truckCargoType.toUpperCase()}</span></div>
    <div class="t2-row"><span class="t2-lbl">ROUND TRIP</span><span class="t2-val" style="color:var(--green);font-size:14px">${TS.truckFreqMin} min</span></div>
    <div class="t2-row"><span class="t2-lbl">CAPACITY / TRIP</span><span class="t2-val" style="font-size:13px;color:var(--text2)">${TS.truckCargoType==='solid'?cap+' items (default stack)':fmt(cap,0)+' m³'}</span></div>
    <div class="t2-row"><span class="t2-lbl">v1.2 NOTE</span><span style="font-family:var(--mono);font-size:8px;color:var(--orange)">Fluid Truck capacity 2,000 m³</span></div>`;
  } else {
    h+=`<div class="t2-row"><span class="t2-lbl">ROUTE DISTANCE</span><span class="t2-val" style="color:var(--ficsit);font-size:14px">${TS.droneDistKm} km</span></div>
    <div class="t2-row"><span class="t2-lbl">DRONES ON ROUTE</span><span class="t2-val" style="color:var(--accent);font-size:14px">${TS.droneCount}</span></div>
    <div class="t2-row"><span class="t2-lbl">ROUND TRIP TIME</span><span class="t2-val" style="color:var(--green);font-size:14px">${fmt(freqMin,2)} min</span></div>
    <div class="t2-row"><span class="t2-lbl">SLOTS / TRIP</span><span class="t2-val" style="font-size:13px;color:var(--text2)">${4*TS.droneCount} slots total (4 per drone)</span></div>`;
  }
  h+=`</div>`;

  // ── Belt/Pipe reference
  h+=`<div class="t2col-card"><div class="t2-title">Conveyor / Pipe Reference</div>
    <table class="trk-tbl"><thead><tr><th>TYPE</th><th>MARK</th><th>CAPACITY</th><th>EQUIV THROUGHPUT</th></tr></thead><tbody>`;
  BELT_MK.forEach(b=>{
    const tripCap=TS.vehicle==='train'?vinfo.solid.carCap*STACK_SIZE.default*TS.carsPerTrain:TS.vehicle==='truck'?vinfo.solid.carCap*STACK_SIZE.default:4*STACK_SIZE.default*TS.droneCount;
    const throughput=tripCap/effFreq;
    h+=`<tr><td style="color:var(--text3)">Belt</td><td>${b.mk}</td><td>${b.rate}/min</td><td>${fmt(throughput/b.rate,2)} ${TS.vehicle}s</td></tr>`;
  });
  if(TS.vehicle!=='drone'){
    PIPE_MK.forEach(p=>{
      const tripCap=TS.vehicle==='train'?vinfo.fluid.carCap*TS.carsPerTrain:vinfo.fluid.carCap;
      const throughput=tripCap/effFreq;
      h+=`<tr><td style="color:var(--text3)">Pipe</td><td>${p.mk}</td><td>${p.rate} m³/min</td><td>${fmt(throughput/p.rate,2)} ${TS.vehicle}s</td></tr>`;
    });
  }
  h+=`</tbody></table></div></div></div>`;

  // ── Item route results
  if(TS.itemRates.length>0){
    h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">${vinfo.icon} Route Requirements by Item</span></div><div class="train-rgrid">`;
    TS.itemRates.forEach(ir=>{
      const capPerTrip=capacityCalc(ir.item);
      const throughput=capPerTrip/effFreq; // items (or m³) per min per vehicle
      const vehiclesNeeded=ir.rate/throughput;
      const vehiclesCeil=Math.ceil(vehiclesNeeded);
      const ss=STACK_SIZE[ir.item]||STACK_SIZE.default;
      let detail='';
      if(TS.vehicle==='drone'){
        const slotsNeeded=vehiclesCeil*4;
        const battsPerTrip=Math.ceil(effFreq/2); // rough: ~1 battery per 2 min flight
        detail=`${vehiclesCeil} drone${vehiclesCeil>1?'s':''} · ${slotsNeeded} slots · stack: ${ss}<br>~${battsPerTrip} batteries/trip/drone`;
      } else if(cargoType==='fluid'){
        detail=`${fmt(vehiclesNeeded,2)} exact · ${vehiclesCeil} ceil · m³/min`;
      } else {
        detail=`${fmt(vehiclesNeeded,2)} exact · ${vehiclesCeil} ceil · stack: ${ss}`;
      }
      h+=`<div class="trcard" style="--tc:var(--ficsit)">
        <div class="trc-item">${ir.item}</div>
        <div class="trc-rate">${fmt(ir.rate,1)} /min</div>
        <div class="trc-cars">${vehiclesCeil}<span class="trc-cl"> ${TS.vehicle.toUpperCase()}${vehiclesCeil>1?'S':''}</span></div>
        <div class="trc-freq">${detail}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // ── Capacity reference table
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">📦 Vehicle Capacity Reference</span></div>
  <table class="trk-tbl"><thead><tr><th>VEHICLE</th><th>TYPE</th><th>CAPACITY</th><th>NOTES</th></tr></thead><tbody>
    <tr><td>Freight Car</td><td>Solid</td><td>32 stacks</td><td>Stack size varies per item</td></tr>
    <tr><td>Fluid Freight Car</td><td>Fluid</td><td>3,200 m³</td><td>Pipes connect directly</td></tr>
    <tr><td>Truck</td><td>Solid</td><td>32 stacks</td><td>Road network required</td></tr>
    <tr><td style="color:var(--orange)">Fluid Truck (v1.2)</td><td>Fluid</td><td style="color:var(--orange)">2,000 m³</td><td style="color:var(--orange)">New in v1.2 · road network required</td></tr>
    <tr><td>Drone</td><td>Solid only</td><td>4 slots</td><td>Stack size × 4 items per trip · batteries consumed</td></tr>
  </tbody></table></div>`;

  pane.innerHTML=h;
}

// ══════════════════════════════════════════════════════════════
//  POWER LEFT + RIGHT
// ══════════════════════════════════════════════════════════════
function buildPowerLeft(lp){
  lp.innerHTML='';
  const s1=ps_sec(lp,'Power Load Target');
  const r1=document.createElement('div'); r1.className='srow';
  const l1=document.createElement('span'); l1.className='slbl'; l1.textContent='TOTAL MW TARGET';
  const inp=document.createElement('input'); inp.type='number'; inp.className='fi fi-w80'; inp.value=WS.targetMW||''; inp.min=0; inp.step=100; inp.placeholder='0';
  inp.addEventListener('change',e=>{WS.targetMW=Math.max(0,parseFloat(e.target.value)||0);renderPower();});
  r1.appendChild(l1); r1.appendChild(inp); s1.appendChild(r1);

  const s2=ps_sec(lp,'Add Load from Factories');
  const r2=document.createElement('div'); r2.className='pw-add';
  const namInp=document.createElement('input'); namInp.type='text'; namInp.className='fi'; namInp.style.flex='1'; namInp.placeholder='Load name...';
  const mwInp=document.createElement('input'); mwInp.type='number'; mwInp.className='fi fi-w60'; mwInp.placeholder='MW'; mwInp.min=1;
  const addB=document.createElement('button'); addB.className='btn btn-add'; addB.textContent='+';
  addB.addEventListener('click',()=>{
    const name=namInp.value.trim()||'Unnamed Load';
    const mw=parseFloat(mwInp.value);
    if(isNaN(mw)||mw<=0) return;
    WS.loads.push({name,mw}); namInp.value=''; mwInp.value='';
    buildPowerLeft(lp); renderPower();
  });
  r2.appendChild(namInp); r2.appendChild(mwInp); r2.appendChild(addB); s2.appendChild(r2);

  const hint=document.createElement('div');
  hint.style.cssText='font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:4px;line-height:1.5;';
  hint.innerHTML='TIP: Use the Planner tab to get power figures,<br>then add them here as named loads.';
  s2.appendChild(hint);

  // Quick-add from planner result
  if(PS.lastResult){
    const byMt={}; Object.values(PS.lastResult.machines).forEach(m=>{const mt=m.recipe.machine;if(!byMt[mt])byMt[mt]=0;byMt[mt]+=(MACHINE_POWER[mt]||0)*m.exact;});
    const totalFromPlanner=Object.values(byMt).reduce((a,b)=>a+b,0);
    if(totalFromPlanner>0){
      const qb=document.createElement('button'); qb.className='btn btn-add btn-w'; qb.style.marginTop='5px';
      qb.textContent=`⚙ IMPORT PLANNER (${fmt(totalFromPlanner,0)} MW)`;
      qb.addEventListener('click',()=>{
        WS.loads.push({name:'Planner Result',mw:totalFromPlanner});
        buildPowerLeft(lp); renderPower();
      });
      s2.appendChild(qb);
    }
  }

  if(WS.loads.length>0){
    const s3=ps_sec(lp,'Current Loads');
    WS.loads.forEach((ld,i)=>{
      const el=document.createElement('div'); el.className='pload-i';
      el.innerHTML=`<span class="pl-n">${ld.name}</span><span class="pl-mw">${fmt(ld.mw,0)} MW</span>`;
      const rm=document.createElement('button'); rm.className='pl-rm'; rm.textContent='×';
      rm.addEventListener('click',()=>{WS.loads.splice(i,1);buildPowerLeft(lp);renderPower();});
      el.appendChild(rm); s3.appendChild(el);
    });
    const clrAll=document.createElement('button'); clrAll.className='btn btn-danger btn-w'; clrAll.style.marginTop='6px'; clrAll.textContent='CLEAR ALL LOADS';
    clrAll.addEventListener('click',()=>{WS.loads=[];buildPowerLeft(lp);renderPower();});
    s3.appendChild(clrAll);
  }
}

function renderPower(){
  const pane=document.getElementById('pane-power');
  const loadTotal=WS.loads.reduce((a,l)=>a+l.mw,0);
  const totalMW=WS.targetMW>0?WS.targetMW:loadTotal;

  if(totalMW<=0){
    pane.innerHTML=`<div class="wait"><div class="wait-ico">⚡</div><div class="wait-t">Power Planner</div><div class="wait-s">Enter a MW target or add named loads on the left. Use the Import button to pull figures from the Planner tab.</div></div>`;
    return;
  }

  const margin=totalMW*1.2;

  // Summary cards
  let h=`<div class="pw-scards">
    <div class="pw-scard" style="--pc:var(--green)">
      <div class="pw-sl">LOAD TOTAL</div>
      <div class="pw-sv">${totalMW>=1000?fmt(totalMW/1000,2)+' GW':fmt(totalMW,0)+' MW'}</div>
      <div class="pw-su">${WS.loads.length>0?WS.loads.length+' named source'+(WS.loads.length!==1?'s':''):'manual target'}</div>
    </div>
    <div class="pw-scard" style="--pc:var(--ficsit)">
      <div class="pw-sl">TARGET WITH +20% MARGIN</div>
      <div class="pw-sv">${margin>=1000?fmt(margin/1000,2)+' GW':fmt(margin,0)+' MW'}</div>
      <div class="pw-su">recommended build target</div>
    </div>
    <div class="pw-scard" style="--pc:var(--accent)">
      <div class="pw-sl">SAFETY HEADROOM</div>
      <div class="pw-sv">${fmt(margin-totalMW,0)} MW</div>
      <div class="pw-su">buffer above load</div>
    </div>
  </div>`;

  // Load breakdown bar chart
  if(WS.loads.length>1){
    const maxLoad=Math.max(...WS.loads.map(l=>l.mw),1);
    h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">📊 Load Breakdown</span></div><div class="pbar-w">
      ${WS.loads.map(ld=>`<div class="pbar-r">
        <span class="pbar-l">${ld.name}</span>
        <div class="pbar-fw"><div class="pbar-f" style="width:${(ld.mw/maxLoad*100).toFixed(1)}%"></div></div>
        <span class="pbar-v">${ld.mw>=1000?fmt(ld.mw/1000,2)+' GW':fmt(ld.mw,0)+' MW'}</span>
      </div>`).join('')}
    </div></div>`;
  }

  // Generator requirements — with practicality context
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">⚡ Generator Requirements</span>
    <span class="rs-c">COUNTS ARE FOR +20% MARGIN TARGET · ${margin>=1000?fmt(margin/1000,2)+' GW':fmt(margin,0)+' MW'}</span>
  </div>`;

  // Separate into practical and reference sections based on load size
  const practical=[], reference=[];
  GENERATORS.forEach(g=>{
    const impractical=(!g.automated)||(g.practicalMax!==null&&totalMW>g.practicalMax);
    if(impractical) reference.push(g); else practical.push(g);
  });

  // Primary options
  h+=`<div class="gen-grid">`;
  practical.forEach(g=>{
    const exactNeeded=totalMW/g.mw;
    const withMargin=margin/g.mw;
    const ceilMargin=Math.ceil(withMargin);
    const totalOutput=ceilMargin*g.mw;
    const surplusMW=totalOutput-totalMW;
    h+=`<div class="gen-card" style="--gc:${g.color}">
      <div class="gen-type">${g.name}</div>
      <div class="gen-count">${ceilMargin}<span class="gen-cl"> BUILDINGS</span></div>
      <div style="font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px;">
        ${fmt(exactNeeded,1)} exact · ${fmt(withMargin,2)} w/margin
      </div>
      <div style="font-family:var(--mono);font-size:8px;color:var(--green);margin-top:2px;">
        ${totalOutput>=1000?fmt(totalOutput/1000,2)+' GW':fmt(totalOutput,0)+' MW'} total output
        · +${surplusMW>=1000?fmt(surplusMW/1000,2)+' GW':fmt(surplusMW,0)+' MW'} surplus
      </div>
      <div class="gen-fuel" style="margin-top:5px;">${g.mw} MW each<br>${g.fuel}<br>
        <span style="color:var(--text3);font-size:7px;">${g.note}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Impractical / reference options
  if(reference.length>0){
    h+=`<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px;
      margin:12px 0 6px;padding-top:10px;border-top:1px solid var(--border);">
      REFERENCE ONLY — NOT RECOMMENDED AT THIS SCALE
    </div><div class="gen-grid">`;
    reference.forEach(g=>{
      const exactNeeded=totalMW/g.mw;
      const withMargin=margin/g.mw;
      const ceilMargin=Math.ceil(withMargin);
      h+=`<div class="gen-card" style="--gc:var(--text3);opacity:0.55;">
        <div class="gen-type" style="color:var(--text3)">${g.name}</div>
        <div class="gen-count" style="color:var(--text3)">${ceilMargin}<span class="gen-cl"> BUILDINGS</span></div>
        <div style="font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px;">
          ${fmt(exactNeeded,1)} exact · ${fmt(withMargin,2)} w/margin
        </div>
        <div class="gen-fuel" style="margin-top:5px;color:var(--text3)">${g.mw} MW each<br>${g.fuel}<br>
          <span style="font-size:7px;">${g.note}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  // Fuel consumption reference
  h+=`<div class="rsec"><div class="rshdr"><span class="rs-t">⛽ Fuel Consumption Reference</span></div>
  <table class="trk-tbl"><thead><tr><th>GENERATOR</th><th>MW</th><th>FUEL</th><th>CONSUME RATE</th><th>FOR ${totalMW>=1000?fmt(totalMW/1000,1)+' GW':fmt(totalMW,0)+' MW'} LOAD</th></tr></thead><tbody>
    ${[
      {gen:'Coal Generator',   mw:75,   fuel:'Coal',              rate:22.5},
      {gen:'Coal Generator',   mw:75,   fuel:'Compacted Coal',    rate:11.25},
      {gen:'Coal Generator',   mw:75,   fuel:'Petroleum Coke',    rate:22.5},
      {gen:'Fuel Generator',   mw:150,  fuel:'Fuel',              rate:12},
      {gen:'Fuel Generator',   mw:150,  fuel:'Turbofuel',         rate:4.5},
      {gen:'Nuclear Plant',    mw:2500, fuel:'Uranium Rod',       rate:0.2},
      {gen:'Nuclear Plant',    mw:2500, fuel:'Plutonium Rod',     rate:0.1},
    ].map(r=>{
      const gens=totalMW/r.mw;
      const totalFuel=gens*r.rate;
      return `<tr>
        <td>${r.gen}</td><td>${r.mw}</td><td>${r.fuel}</td>
        <td>${r.rate}/min per gen</td>
        <td style="color:var(--ficsit)">${fmt(totalFuel,1)}/min total</td>
      </tr>`;
    }).join('')}
  </tbody></table></div>`;

  pane.innerHTML=h;
}


// ══════════════════════════════════════════════════════════════
//  URL STATE — encode full app state into hash, restore on load
// ══════════════════════════════════════════════════════════════
function encodeState(){
  const s={
    tab: activeTab,
    targets: PS.targets,
    alts: PS.altSelections,
    milestone: PS.activeMilestone,
    gm: { recipe:GM.recipe, power:GM.power },
    ps: { machineMode:PS.machineMode, groupBy:PS.groupBy, showClock:PS.showClock, showPower:PS.showPower },
    rs: { search:RS.search, layerFilter:RS.layerFilter, machineFilter:RS.machineFilter, altOnly:RS.altOnly, scale:RS.scale },
    ts: { itemRates:TS.itemRates, trainFreqMin:TS.trainFreqMin, carsPerTrain:TS.carsPerTrain, trackType:TS.trackType },
    ws: { loads:WS.loads, targetMW:WS.targetMW },
  };
  try{ return btoa(unescape(encodeURIComponent(JSON.stringify(s)))); }
  catch(e){ return ''; }
}

function decodeState(hash){
  try{
    const s=JSON.parse(decodeURIComponent(escape(atob(hash))));
    if(s.tab) activeTab=s.tab;
    if(s.targets) PS.targets=s.targets;
    if(s.alts) PS.altSelections=s.alts;
    if(s.milestone) PS.activeMilestone=s.milestone;
    if(s.gm){ GM.recipe=s.gm.recipe||1; GM.power=s.gm.power||1; }
    if(s.ps){ Object.assign(PS,{machineMode:s.ps.machineMode,groupBy:s.ps.groupBy,showClock:s.ps.showClock,showPower:s.ps.showPower}); }
    if(s.rs){ Object.assign(RS,{search:s.rs.search||'',layerFilter:s.rs.layerFilter||'all',machineFilter:s.rs.machineFilter||'all',altOnly:!!s.rs.altOnly,scale:s.rs.scale||1}); }
    if(s.ts){ Object.assign(TS,s.ts); }
    if(s.ws){ Object.assign(WS,s.ws); }
    return true;
  } catch(e){ return false; }
}

function pushState(){
  const enc=encodeState();
  if(enc) history.replaceState(null,'','#'+enc);
}

function shareURL(){
  pushState();
  const url=window.location.href;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('shareCopyBtn');
    if(!btn) return;
    btn.textContent='✓ COPIED'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='COPY LINK'; btn.classList.remove('copied'); },2000);
  }).catch(()=>{
    // fallback: select the text field
    const field=document.getElementById('shareUrlField');
    if(field){ field.select(); document.execCommand('copy'); }
  });
}
